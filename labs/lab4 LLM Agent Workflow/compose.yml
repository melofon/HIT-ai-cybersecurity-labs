services:
  chainlit:
    image: cybersec-agent-workflow-lab4
    container_name: cybersec-agent-workflow-lab4
    build: .
    working_dir: /chainlit-runtime
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - path: .env
        required: false
    environment:
      API_BASE_URL: "https://api.groq.com/openai/v1"
      MODEL: "qwen/qwen3-32b"
      PYTHONPATH: "/app"
      PYTHONUNBUFFERED: "1"

    command: ["chainlit", "run", "/app/app/app.py", "--host", "0.0.0.0", "--port", "8000", "--headless"]
